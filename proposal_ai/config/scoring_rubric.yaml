# =========================================================================
# 적격성 평가 기준 (이판단 에이전트가 사용)
# 가중치 합계 = 100
# =========================================================================
weights:
  tech_fit: 30          # 기술 적합도 - 우리 스택과 매칭
  budget_fit: 25        # 예산 적합도 - 회사 규모 대비 적정
  competition: 20       # 경쟁 강도 (역점수: 진입장벽 높을수록 유리)
  schedule: 15          # 일정 여유도 - 제안서 작성 가능 시간
  experience_fit: 10    # 수행 실적 적합도

# 추천 임계값
recommendation_thresholds:
  참여권장: 70
  조건부: 50
  비권장: 0

# 판단 보조 규칙 (LLM 프롬프트에 주입)
guidance:
  tech_fit: |
    공고에 명시된 기술 요구사항(언어/프레임워크/인프라/CMS 등)을 추출하고
    회사 보유 기술스택과의 매칭 비율을 0-100으로 환산한다.
  budget_fit: |
    예산이 회사 typical_budget_min~max 안에 있으면 90+,
    -30%~+50% 범위면 60-80, 그 외는 40 이하.
    예산 미공개면 기간*월단가(약 1500만원)로 추정 후 평가.
  competition: |
    참가자격이 까다로울수록(예: 특정 인증, 대기업 제한) 진입장벽 높아 가산점.
    공개경쟁이고 자격이 약하면 경쟁 치열 → 감점.
  schedule: |
    공고 마감일까지 남은 영업일이 14일 이상이면 90+,
    7-14일이면 60-80, 7일 미만이면 30 이하.
  experience_fit: |
    유사 사업 실적/포트폴리오 요구 수준이 회사가 충족 가능한 수준이면 80+,
    과도한 실적(예: 50억 이상 단일 사업)을 요구하면 30 이하.
